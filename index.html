<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Générateur RPG</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>

<body>

<h1>Générateur de Personnage</h1>

<div class="container">

  <h2>Informations</h2>

  <label>Nom :</label>
  <input type="text" id="nom">

  <label>Age :</label>
  <input type="number" id="age" min="1" max="300" value="10">

  <label>Sexe :</label>
  <select id="sexe">
    <option>Homme</option>
    <option>Femme</option>
    <option>Autre</option>
  </select>

  <label>Race :</label>
  <select id="race">
    <option>Humain</option>
    <option>Elfe</option>
    <option>Nain</option>
    <option>Orc</option>
    <option>Démon</option>
    <option>Dragonide</option>
    <option>Fée</option>
  </select>

  <label>Classe :</label>
  <select id="classe">
    <option>Guerrier</option>
    <option>Mage</option>
    <option>Voleur</option>
    <option>Paladin</option>
    <option>Sorcier</option>
    <option>Archer</option>
    <option>Berserker</option>
    <option>Prêtre</option>
  </select>

  <label>Arme :</label>
  <select id="classe">
    <option>Épé</option>
    <option>Dague</option>
    <option>Baton</option>
    <option>Livre</option>
    <option>Baguette</option>
    <option>Arc</option>
    <option>Mass</option>
    <option>Bouclier</option>
    <option>Lance-pierre</option>
    <option>Lance</option>
    <option>Hache</option>
  </select>

  <h2>Statistiques</h2>

  <label>Force :</label>
  <input type="number" id="force" min="1" max="20" value="10">

  <label>Résistance :</label>
  <input type="number" id="resistance" min="1" max="20" value="10">

  <label>Agilité :</label>
  <input type="number" id="agilite" min="1" max="20" value="10">

  <label>Intelligence :</label>
  <input type="number" id="intelligence" min="1" max="20" value="10">

  

</div>

</body>
</html>
